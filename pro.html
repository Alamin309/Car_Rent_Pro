<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Rental UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    padding:15px 50px;
    align-items:center;
}

.navbar h2{
    color:#f39c12;
}

.nav-links a{
    color:#fff;
    margin:0 15px;
    text-decoration:none;
}

.nav-links a:hover{
    color:#f39c12;
}

/* HERO */
.hero{
    height:80vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#f39c12;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

/* CARS */
.section{
    padding:50px;
    text-align:center;
}

.cars{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.car{
    background:#fff;
    padding:15px;
    border-radius:10px;
}

.car img{
    width:100%;
    border-radius:10px;
}

/* SERVICES */
.services{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

.service{
    flex:1 1 200px;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

/* FOOTER */
.footer{
    background:#111;
    color:#fff;
    padding:30px;
    text-align:center;
    margin-top:50px;
}
</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>CarRent</h2>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Cars</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div>
        <h1>Car Rental in Bangladesh</h1>
        <p>Book your ride anytime, anywhere</p>
        <button>Request Quote</button>
    </div>
</div>

<!-- CARS -->
<div class="section">
    <h2>Our Cars</h2>
    <div class="cars">
        <div class="car">
            <img src="https://images.unsplash.com/photo-1549921296-3ecf4c4a6f05">
            <h3>Toyota Corolla</h3>
        </div>
        <div class="car">
            <img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d">
            <h3>Honda Civic</h3>
        </div>
        <div class="car">
            <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
            <h3>Premio</h3>
        </div>
    </div>
</div>

<!-- SERVICES -->
<div class="section">
    <h2>Our Services</h2>
    <div class="services">
        <div class="service">Airport Pickup</div>
        <div class="service">Wedding Car</div>
        <div class="service">Family Trip</div>
        <div class="service">Long Term Rental</div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 CarRent | All Rights Reserved</p>
</div>

</body>
</html>
